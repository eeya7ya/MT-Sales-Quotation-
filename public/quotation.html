<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation — MT Sales System</title>
<link rel="stylesheet" href="/css/quotation.css">
<!-- html2pdf for export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  .q-empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #8a9ab0;
  }
  .q-empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: .4; }
  .company-logo-upload {
    position: relative;
    cursor: pointer;
  }
  .logo-overlay {
    position: absolute;
    inset: 0;
    background: rgba(26,58,92,.55);
    border-radius: 10px;
    display: none;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }
  .company-logo-upload:hover .logo-overlay { display: flex; }
</style>
</head>
<body>

<!-- ═══════ TOOLBAR ══════════════════════════════════════════ -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-title">📄 Quotation Preview</div>
  <div class="toolbar-actions">
    <a href="/" class="tbtn tbtn-back">← Back to Builder</a>
    <button class="tbtn tbtn-edit" onclick="editQuotation()">✏ Edit</button>
    <button class="tbtn tbtn-print" onclick="printQuotation()">🖨 Print</button>
    <button class="tbtn tbtn-pdf" onclick="exportPDF()">⬇ Export PDF</button>
  </div>
</div>

<!-- ═══════ PAGE WRAPPER ════════════════════════════════════ -->
<div class="page-wrapper">

  <div id="emptyState" class="q-empty-state" style="display:none;">
    <div class="icon">📋</div>
    <h2 style="margin-bottom:10px;">No quotation items found</h2>
    <p>Go back to the builder and add products to your quotation.</p>
    <a href="/" style="display:inline-block;margin-top:16px;padding:10px 20px;background:#1a3a5c;color:#fff;border-radius:6px;text-decoration:none;font-weight:600;">← Go to Builder</a>
  </div>

  <!-- ════ PRINTABLE DOCUMENT — pages injected by JS ════════ -->
  <div class="quotation-doc" id="quotationDoc">
    <!-- Logo input (hidden, accessible from any page) -->
    <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="uploadLogo(this)">
  </div>

</div>

<!-- Toast container -->
<div id="toast-container" style="position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;"></div>

<script src="/js/quotation.js"></script>
</body>
</html>
